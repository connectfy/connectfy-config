events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # --- НАСТРОЙКИ КЕША (CDN) ---
    proxy_cache_path /tmp/nginx_cache
        levels=1:2
        keys_zone=minio_cache:50m
        max_size=2g
        inactive=24h
        use_temp_path=off;

    sendfile on;

    # --- UPSTREAMS (Куда слать запросы) ---
    
    # 1. API Gateway (Бизнес-логика + Auth)
    upstream api_gateway_local {
        server host.docker.internal:3100;
    }

    # 2. File Service (Загрузка файлов)
    upstream file_service_local {
        server host.docker.internal:9003;
    }

    # 3. MinIO (Скачивание файлов)
    upstream minio_upstream {
        server minio:9000; # Внутреннее имя контейнера Docker
    }

    server {
        listen 80;
        server_name localhost;
        # Если хочешь, чтобы работало и cdn.localhost, добавь его сюда:
        # server_name localhost cdn.localhost;

        # =========================================================
        # 1. ЗАГРУЗКА ФАЙЛОВ (POST /files/upload) -> File Service
        # =========================================================
        location /api/files/upload {
            # -----------------------------------------------------------
            # 1. CORS PREFLIGHT (OPTIONS)
            # Nginx отвечает за это сам, чтобы не дергать авторизацию
            # -----------------------------------------------------------
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # -----------------------------------------------------------
            # 2. УДАЛЯЕМ ВСЕ add_header ЗДЕСЬ!
            # Пусть Express сам отдаст заголовки для POST запроса.
            # Если оставить их тут — будет дубль.
            # -----------------------------------------------------------
            
            # 3. АВТОРИЗАЦИЯ И ПРОКСИРОВАНИЕ
            auth_request /auth-check; 

            client_max_body_size 100M;
            proxy_request_buffering off;

            proxy_pass http://file_service_local/files/upload; 
            
            proxy_set_header Host $host;
        }

        # =========================================================
        # 2. CDN / СКАЧИВАНИЕ (GET /cdn/...) -> MinIO + Cache
        # =========================================================
        # Пример: http://localhost:3100/cdn/my-bucket/image.jpg
        location /cdn/ {
            # А. Проверка прав (если файлы приватные)
            # Если файлы публичные — закомментируй эту строку
            # auth_request /auth-check; 

            # Б. Убираем префикс /cdn/ перед отправкой в MinIO
            # Был запрос: /cdn/bucket/img.jpg -> Станет: /bucket/img.jpg
            rewrite ^/cdn/(.*) /$1 break;

            # В. Проксируем в MinIO
            proxy_pass http://minio:9000;
            
            # Г. Включаем КЕШИРОВАНИЕ (как в твоем старом конфиге)
            proxy_cache minio_cache;
            proxy_cache_valid 200 24h;
            proxy_cache_key $request_uri;
            add_header X-Cache-Status $upstream_cache_status; # Видно в браузере (HIT/MISS)

            # Д. Заголовки для MinIO
            proxy_set_header Host minio:9000; # Важно для MinIO signatures
        }

        # =========================================================
        # 3. ВСПОМОГАТЕЛЬНЫЕ (Auth Check)
        # =========================================================
        location = /auth-check {
            internal;
            # Запрос идет в API Gateway (порт 3000)
            client_max_body_size 100M;
            proxy_pass http://api_gateway_local/api/minio/auth;
            
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        # =========================================================
        # 4. API (Всё остальное) -> API Gateway
        # =========================================================
        location / {
            proxy_pass http://api_gateway_local;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}