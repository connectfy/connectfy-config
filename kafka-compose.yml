# version: '3'

services:
  kafka-0:
    image: confluentinc/cp-kafka:latest
    hostname: kafka-0
    container_name: kafka-0
    environment:
      # --- KRaft core ---
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 0
      CLUSTER_ID: PZXjiY7gQvedV8UKu_RsSw
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093

      # --- Listeners / protocols ---
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- Required internal topics (RF tuned for 2 brokers) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # --- Storage dir (Confluent default path) ---
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # --- Disable ZK migration (stays KRaft-only) ---
      KAFKA_ZOOKEEPER_METADATA_MIGRATION_ENABLE: 'false'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka-0:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 15
    volumes:
      - kafka_0_data:/var/lib/kafka/data
    networks:
      - kafka_network

  kafka-1:
    image: confluentinc/cp-kafka:latest
    hostname: kafka-1
    container_name: kafka-1
    environment:
      # --- KRaft core ---
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 1
      CLUSTER_ID: PZXjiY7gQvedV8UKu_RsSw
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093

      # --- Listeners / protocols ---
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- Internal topics & replication (match broker-0) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # --- Storage dir ---
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_ZOOKEEPER_METADATA_MIGRATION_ENABLE: 'false'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka-1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 15
    volumes:
      - kafka_1_data:/var/lib/kafka/data
    networks:
      - kafka_network

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - '8080:8080'
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
    volumes:
      - ./config.yml:/etc/kafkaui/dynamic_config.yaml
    depends_on:
      - kafka-0
      - kafka-1
    networks:
      - kafka_network
    # Use HTTP health endpoint exposed by Kafka UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  kafka_network:
    external: true

volumes:
  kafka_0_data:
    driver: local
  kafka_1_data:
    driver: local
